# ------------------------
# --- general settings ---
# ------------------------

# define <prefix> combination
set -g prefix C-Space
set -g prefix2 C-b
bind C-Space send-prefix

# start window/panes numbering at 1
set -g base-index      1
set -g pane-base-index 1

set -g renumber-windows on

# enable mouse
set -g mouse on

# number of lines in history
set -g history-limit 50000

# reduce escape timeout for faster vim mode switching
set -g escape-time 0

# enable clipboard passthrough
set -g set-clipboard on
set -g allow-passthrough on

# enable extended keys for better modifier support
set -g extended-keys on
set -g extended-keys-format csi-u

# navigation with vi style
setw -g mode-keys vi
set -g status-keys vi

# enable activity alerts
set -g monitor-activity on
set -g visual-activity  on

# -----------------------
# --- visual settings ---
# -----------------------

# turn on 256 color support in tmux
set -g default-terminal "tmux-256color"
set -ga terminal-features ",xterm-256color:RGB" # For true color support

# color definitions
bg_color="#000000"
fg_color="#ffffff"
wd_color="#272822"

# status bar
set -g status-left     ""
set -g status-style    bg=$bg_color,fg=$fg_color
set -g status-justify  left
set -g status-right    "#[fg=blue]#{?pane_in_mode,COPY ,}#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=brightblack]#h "

# panes
set -g pane-border-style        fg=brightblack
set -g pane-active-border-style fg=blue
set -g pane-border-status       top
set -g pane-border-format       ""

# window
set -g window-status-separator      " "
set -g window-status-format         "#[fg=brightblack] #I "
set -g window-status-current-format "#[fg=blue,bold] #I "
set -g window-status-style          bg=$bg_color,fg=$fg_color
set -g window-status-current-style  bg=$wd_color,fg=$fg_color
set -g window-status-last-style     bg=$bg_color,fg=$fg_color
set -g window-status-activity-style bg=$bg_color,fg=$fg_color

# --------------------
# --- key bindings ---
# --------------------

# prefix-less split shortcuts
bind -n M-v split-window -h -c "#{pane_current_path}"
bind -n M-s split-window -v -c "#{pane_current_path}"

# prefix-less pane navigation with alt + vi keys
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# prefix-less pane resize with alt + uppercase vi keys
bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 5
bind -n M-K resize-pane -U 5
bind -n M-L resize-pane -R 5

# prefix-less window navigation with alt + vi keys
bind -n M-p select-window -t -1
bind -n M-n select-window -t +1

# prefix-less window swapping with alt + vi keys
bind -n M-P swap-window -t -1 \; select-window -t -1
bind -n M-N swap-window -t +1 \; select-window -t +1

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# window management
bind c new-window -c "#{pane_current_path}"
bind k kill-window
bind r source-file ~/.config/tmux/tmux.conf \; display "Configuration reloaded"

bind Enter copy-mode

# vim-like selection in selection mode
bind -T copy-mode-vi v send-keys -X begin-selection

# copy to clipboard
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xsel --clipboard'

set -g focus-events on
